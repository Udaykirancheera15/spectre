repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - hydra-core>=1.3,<1.4
          - omegaconf>=2.3,<2.4
          - pydantic>=2.7,<3.0
          - rich>=13.7,<14.0
          - structlog>=24.1,<25.0
          - typer>=0.12,<1.0
