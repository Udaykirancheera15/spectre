# CI-readiness placeholder.
#
# The authoritative local environment for Spectre is the existing Conda
# environment named `spectre`. Hosted CI cannot assume that local environment
# exists, so this workflow documents the lint command without enabling a
# separate environment policy in M0.
name: lint-placeholder

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Run locally: conda activate spectre && python -m ruff check ."
